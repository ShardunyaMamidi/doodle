server:
  port: 8080

doodle:
  allowed-origins:
    - http://localhost:4200
  room:
    max-players: 8
    code-length: 6
    cleanup-delay-seconds: 60
  game:
    default-rounds: 3
    turn-time-seconds: 80
    word-selection-seconds: 15
    turn-end-delay-seconds: 5
    round-end-delay-seconds: 5
    game-over-delay-seconds: 10
    hint-intervals: [0.4, 0.6, 0.8]
  scoring:
    base-points: 100
    order-bonus-per-rank: 15
    min-guesser-points: 10
  words:
    default-language: en
    path: classpath:words/

logging:
  level:
    com.mvp.doodle: DEBUG
    org.springframework.messaging: INFO